name: Generate Meal Plan PDF

on:
  workflow_dispatch:
  push:
    paths:
      - 'meal-plan-source.html'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Puppeteer
        run: |
          npm install puppeteer

      - name: Generate PDF from HTML file
        run: |
          node - <<'EOF'
          const puppeteer = require('puppeteer');
          const path = require('path');
          const fs = require('fs');
          
          (async () => {
            const browser = await puppeteer.launch({args: ['--no-sandbox', '--disable-setuid-sandbox']});
            const page = await browser.newPage();
            const htmlPath = path.resolve('meal-plan-source.html');
            await page.goto('file://' + htmlPath, {waitUntil: 'networkidle0'});
            await page.pdf({
              path: '7day_mealplan.pdf',
              format: 'A4',
              printBackground: true,
              margin: {top: '15mm', bottom: '15mm', left: '15mm', right: '15mm'}
            });
            await browser.close();
            const stats = fs.statSync('7day_mealplan.pdf');
            console.log('PDF size:', stats.size, 'bytes');
          })();
          EOF

      - name: Commit and push PDF
        run: |
          git config user.name "ruicastilho23"
          git config user.email "ruicastilho.50@gmail.com"
          git add 7day_mealplan.pdf
          git diff --staged --quiet || git commit -m "Generate meal plan PDF from HTML source"
          git push
