name: Upload Correct PDF

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download correct PDF
        run: |
          curl -L -o "7day_mealplan.pdf" "https://ppl-ai-file-upload.s3.amazonaws.com/web/direct-files/attachments/83633338/29769c6e-1b79-4d54-87d1-ebe5b13d1114/Your-FREE-7-Day-AI-Generated-Meal-Plan.pdf"
          ls -la 7day_mealplan.pdf
          file 7day_mealplan.pdf

      - name: Commit and push PDF
        run: |
          git config user.name "ruicastilho23"
          git config user.email "ruicastilho.50@gmail.com"
          git add 7day_mealplan.pdf
          git diff --staged --quiet || git commit -m "Upload correct meal plan PDF"
          git push
