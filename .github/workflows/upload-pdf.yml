name: Generate PDF from HTML

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
          npm install -g puppeteer-cli || true
          pip install weasyprint 2>/dev/null || true

      - name: Generate PDF using wkhtmltopdf
        run: |
          sudo apt-get install -y wkhtmltopdf
          wkhtmltopdf --enable-local-file-access \
            --page-size A4 \
            --margin-top 10mm \
            --margin-bottom 10mm \
            --margin-left 10mm \
            --margin-right 10mm \
            https://ai-health-wellness.netlify.app/free-7-day-ai-meal-plan.html \
            7day_mealplan.pdf
          ls -la 7day_mealplan.pdf

      - name: Commit and push PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 7day_mealplan.pdf
          git diff --staged --quiet || git commit -m "Regenerate PDF from HTML page"
          git push
